<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>П'ятнашки • Glassmorphism</title>
    <!-- Підключення шрифтів -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ========== style.css ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Montserrat', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 30%, #1e2a4a, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .game-container {
            max-width: 600px;
            width: 100%;
        }

        /* Glass-панель */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(99, 102, 241, 0.25);
            border-radius: 40px;
            padding: 30px 24px;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.08);
        }

        /* Хедер зі статистикою */
        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 60px;
            padding: 10px 20px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 10px;
            color: #e2e8f0;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .stat-icon {
            font-size: 1.4rem;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #10b981; /* смарагдовий */
            text-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
            letter-spacing: 1px;
        }

        .manhattan-badge {
            background: #6366f1;
            color: white;
            border-radius: 30px;
            padding: 8px 18px;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            box-shadow: 0 0 15px #6366f180;
        }

        /* Ігрове поле (CSS Grid) */
        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            background: rgba(10, 15, 30, 0.5);
            border-radius: 36px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(99, 102, 241, 0.4);
            box-shadow: inset 0 0 20px #00000050, 0 20px 30px -10px #000000cc;
        }

        /* Плитка (Tile) */
        .tile {
            aspect-ratio: 1 / 1;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 700;
            color: #f1f5f9;
            border: 2px solid rgba(99, 102, 241, 0.4);
            box-shadow: 0 10px 0 #0a0f1f, 0 8px 15px rgba(0, 0, 0, 0.6);
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            cursor: pointer;
            user-select: none;
            text-shadow: 0 2px 5px #00000080;
        }

        .tile:not(.empty):hover {
            transform: scale(1.02);
            border-color: #818cf8;
            background: rgba(40, 55, 80, 0.8);
            box-shadow: 0 0 20px #6366f1aa, 0 6px 0 #0a0f1f;
        }

        /* Порожня плитка (isEmpty) */
        .tile.empty {
            background: rgba(15, 23, 42, 0.3);
            border: 2px dashed #4f5b7a;
            box-shadow: none;
            color: transparent;
            backdrop-filter: blur(4px);
            opacity: 0.8;
            cursor: pointer;
        }

        .tile.empty:hover {
            border-color: #a5b4fc;
            background: rgba(40, 55, 80, 0.4);
        }

        /* Плитка-підказка (Hint) */
        .tile.hint {
            border-color: #10b981;
            box-shadow: 0 0 0 3px #10b981, 0 8px 0 #0a531e;
            transition: 0.15s;
        }

        /* Панель керування */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }

        .glass-btn {
            background: rgba(20, 30, 50, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid #6366f1;
            padding: 12px 22px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            color: #e0e7ff;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #0f1120;
            letter-spacing: 0.5px;
            flex: 1 0 auto;
            min-width: 100px;
            text-transform: uppercase;
        }

        .glass-btn:hover {
            background: #6366f1;
            color: white;
            box-shadow: 0 0 20px #6366f1, 0 4px 0 #2e3a8c;
            transform: translateY(-2px);
            border-color: #a5b4fc;
        }

        .glass-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #2e3a8c;
        }

        /* Модальне вікно (Glass pop-up) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
            animation: popUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-content {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid #6366f1;
            border-radius: 60px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            color: white;
            box-shadow: 0 30px 50px #000000cc;
        }

        .modal-content h2 {
            font-size: 2.5rem;
            color: #10b981;
            margin-bottom: 15px;
        }

        .modal-stats {
            font-size: 1.4rem;
            background: #1e293b80;
            border-radius: 40px;
            padding: 15px;
            margin: 20px 0;
        }

        .close-btn {
            background: #6366f1;
            border: none;
            padding: 14px 30px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            border-bottom: 4px solid #334155;
        }

        @keyframes popUp {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Таблиця рекордів */
        .records-list {
            list-style: none;
            text-align: left;
            background: #0f172a80;
            border-radius: 30px;
            padding: 15px;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .records-list li {
            padding: 8px 12px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            font-family: 'Montserrat', monospace;
        }

        .records-list li span:first-child { color: #94a3b8; }
        .records-list li span:last-child { color: #10b981; font-weight: 700; }
    </style>
</head>
<body>
    <div class="game-container glass-panel">
        <!-- Статистика -->
        <div class="stats-header">
            <div class="stat-item"><span class="stat-icon">🎯</span> Ходи: <span id="movesDisplay" class="stat-value">0</span></div>
            <div class="stat-item"><span class="stat-icon">📏</span> Manhattan: <span id="manhattanDisplay" class="stat-value">0</span></div>
            <div class="manhattan-badge" id="timerDisplay">⏱️ 00:00</div>
        </div>

        <!-- Ігрове поле 4x4 -->
        <div id="board" class="board"></div>

        <!-- Панель кнопок -->
        <div class="controls">
            <button class="glass-btn" id="newGameBtn">🔄 N: Нова</button>
            <button class="glass-btn" id="hintBtn">💡 H: Підказка</button>
            <button class="glass-btn" id="recordsBtn">🏆 T: Рекорди</button>
        </div>
        <div style="text-align: center; margin-top: 15px; color:#7f8ea3; font-size:0.9rem;">
            ←↑→↓  або  W A S D  ·  клік по плитці
        </div>
    </div>

    <!-- Модальне вікно перемоги -->
    <div id="winModal" class="modal">
        <div class="modal-content">
            <h2>🎉 Перемога!</h2>
            <div class="modal-stats">
                <div>🏁 Ходи: <span id="winMoves">0</span></div>
                <div>⏱️ Час: <span id="winTime">0:00</span></div>
            </div>
            <button class="close-btn" id="closeWinModal">Супер!</button>
        </div>
    </div>

    <!-- Модальне вікно рекордів -->
    <div id="recordsModal" class="modal">
        <div class="modal-content">
            <h2>🏅 Топ-10</h2>
            <ul id="highscoresList" class="records-list"></ul>
            <button class="close-btn" id="closeRecordsModal">OK</button>
        </div>
    </div>

    <script>
        // ========== logic.js та storage.js (ES6+) ==========

        (function() {
            // ---------- Клас Tile ----------
            class Tile {
                constructor(value) {
                    this.value = value;
                }
                isEmpty() {
                    return this.value === 16; // 16 позначає пусту клітинку
                }
            }

            // ---------- GameField (логіка, Manhattan, перевірка збірності) ----------
            class GameField {
                constructor() {
                    this.size = 4;
                    this.tiles = [];
                    this.moves = 0;
                    this.startTime = Date.now();
                    this.timerInterval = null;
                    this.listeners = [];
                }

                // Початкова збірна позиція (1-15, 16 - пуста)
                initSolved() {
                    this.tiles = Array.from({ length: 16 }, (_, i) => new Tile(i + 1));
                    this.moves = 0;
                }

                // Перемішати з перевіркою на вирішуваність
                shuffle(stepCount = 200) {
                    this.initSolved();
                    let lastMove = -1;
                    for (let s = 0; s < stepCount; s++) {
                        const emptyIdx = this.tiles.findIndex(t => t.isEmpty());
                        const moves = this.getValidMoves(emptyIdx);
                        // виключити зворотній хід, щоб не зіпсувати перемішування
                        const filtered = moves.filter(m => m !== lastMove);
                        const move = filtered.length ? filtered[Math.floor(Math.random() * filtered.length)] : moves[0];
                        this.swap(emptyIdx, move);
                        lastMove = move; // запам'ятати, звідки прийшли
                    }
                    // Фінальна перевірка: якщо не вирішуване, зробити одну транспозицію (обмін двох непустих)
                    if (!this.isSolvable()) {
                        // обміняти перші дві непусті плитки (крім 16)
                        const nonEmpty = this.tiles.map((t, idx) => idx).filter(i => !this.tiles[i].isEmpty());
                        if (nonEmpty.length >= 2) {
                            this.swap(nonEmpty[0], nonEmpty[1]);
                        }
                    }
                    this.moves = 0;
                }

                // Отримати індекс пустої
                getEmptyIndex() {
                    return this.tiles.findIndex(t => t.isEmpty());
                }

                // Можливі ходи (сусіди пустої)
                getValidMoves(emptyIdx) {
                    const row = Math.floor(emptyIdx / 4);
                    const col = emptyIdx % 4;
                    const neighbors = [];
                    if (row > 0) neighbors.push(emptyIdx - 4);
                    if (row < 3) neighbors.push(emptyIdx + 4);
                    if (col > 0) neighbors.push(emptyIdx - 1);
                    if (col < 3) neighbors.push(emptyIdx + 1);
                    return neighbors;
                }

                // Обмін двох плиток
                swap(i, j) {
                    [this.tiles[i], this.tiles[j]] = [this.tiles[j], this.tiles[i]];
                }

                // Спробувати зробити хід за індексом клітинки (якщо це сусід пустої)
                tryMove(index) {
                    const emptyIdx = this.getEmptyIndex();
                    const valid = this.getValidMoves(emptyIdx);
                    if (valid.includes(index)) {
                        this.swap(emptyIdx, index);
                        this.moves++;
                        return true;
                    }
                    return false;
                }

                // Перевірка на збірність (для 4x4)
                isSolvable() {
                    let invCount = 0;
                    const vals = this.tiles.map(t => t.value).filter(v => v !== 16);
                    for (let i = 0; i < vals.length; i++) {
                        for (let j = i + 1; j < vals.length; j++) {
                            if (vals[i] > vals[j]) invCount++;
                        }
                    }
                    const emptyRowFromBottom = 4 - Math.floor(this.getEmptyIndex() / 4);
                    if (emptyRowFromBottom % 2 === 0) return invCount % 2 === 1;
                    else return invCount % 2 === 0;
                }

                // Обчислення Manhattan Distance
                manhattanDistance() {
                    let dist = 0;
                    this.tiles.forEach((tile, idx) => {
                        if (tile.isEmpty()) return;
                        const val = tile.value - 1; // 0..15
                        const targetRow = Math.floor(val / 4);
                        const targetCol = val % 4;
                        const currentRow = Math.floor(idx / 4);
                        const currentCol = idx % 4;
                        dist += Math.abs(targetRow - currentRow) + Math.abs(targetCol - currentCol);
                    });
                    return dist;
                }

                // Перевірка перемоги (всі на місцях)
                isWin() {
                    return this.tiles.every((tile, idx) => tile.value === idx + 1);
                }

                // Підписка на зміни
                subscribe(listener) {
                    this.listeners.push(listener);
                }

                notify() {
                    this.listeners.forEach(fn => fn());
                }
            }

            // ---------- ScoreManager (localStorage) ----------
            class ScoreManager {
                constructor() {
                    this.storageKey = 'fifteen_top10';
                }

                getRecords() {
                    const stored = localStorage.getItem(this.storageKey);
                    return stored ? JSON.parse(stored) : [];
                }

                addRecord(name, moves, seconds) {
                    const records = this.getRecords();
                    const date = new Date().toLocaleDateString('uk-UA');
                    records.push({ name, moves, seconds, date });
                    records.sort((a, b) => a.moves - b.moves || a.seconds - b.seconds);
                    const top10 = records.slice(0, 10);
                    localStorage.setItem(this.storageKey, JSON.stringify(top10));
                }

                clear() {
                    localStorage.removeItem(this.storageKey);
                }
            }

            // ---------- Renderer (DOM маніпуляції) ----------
            class Renderer {
                constructor(boardEl, gameField, scoreManager) {
                    this.boardEl = boardEl;
                    gameField.subscribe(() => this.render(gameField));
                    this.scoreManager = scoreManager;
                    this.hintIndex = null; // для підсвічування підказки
                }

                render(gameField) {
                    this.boardEl.innerHTML = '';
                    gameField.tiles.forEach((tile, index) => {
                        const tileDiv = document.createElement('div');
                        tileDiv.className = `tile ${tile.isEmpty() ? 'empty' : ''}`;
                        if (this.hintIndex === index) tileDiv.classList.add('hint');
                        if (!tile.isEmpty()) tileDiv.textContent = tile.value;
                        tileDiv.dataset.index = index;
                        this.boardEl.appendChild(tileDiv);
                    });
                }

                clearHint() {
                    this.hintIndex = null;
                }
            }

            // ---------- Hint (евристика Manhattan) ----------
            function getHintMove(gameField) {
                const emptyIdx = gameField.getEmptyIndex();
                const possible = gameField.getValidMoves(emptyIdx);
                let bestMove = possible[0];
                let bestDist = Infinity;

                for (let moveIdx of possible) {
                    // імітуємо хід
                    const tempTiles = gameField.tiles.map(t => new Tile(t.value));
                    [tempTiles[emptyIdx], tempTiles[moveIdx]] = [tempTiles[moveIdx], tempTiles[emptyIdx]];

                    // обчислюємо манхеттен для імітації
                    let dist = 0;
                    tempTiles.forEach((tile, idx) => {
                        if (tile.isEmpty()) return;
                        const val = tile.value - 1;
                        const targetRow = Math.floor(val / 4);
                        const targetCol = val % 4;
                        const currentRow = Math.floor(idx / 4);
                        const currentCol = idx % 4;
                        dist += Math.abs(targetRow - currentRow) + Math.abs(targetCol - currentCol);
                    });
                    if (dist < bestDist) {
                        bestDist = dist;
                        bestMove = moveIdx;
                    }
                }
                return bestMove; // індекс плитки, яку ТРЕБА посунути (на місце пустої)
            }

            // ---------- Ініціалізація додатку ----------
            const gameField = new GameField();
            const scoreManager = new ScoreManager();

            // DOM елементи
            const boardEl = document.getElementById('board');
            const movesSpan = document.getElementById('movesDisplay');
            const manhattanSpan = document.getElementById('manhattanDisplay');
            const timerSpan = document.getElementById('timerDisplay');
            const winModal = document.getElementById('winModal');
            const recordsModal = document.getElementById('recordsModal');
            const winMovesSpan = document.getElementById('winMoves');
            const winTimeSpan = document.getElementById('winTime');
            const highscoresList = document.getElementById('highscoresList');

            const renderer = new Renderer(boardEl, gameField, scoreManager);

            // Оновлення UI статистики
            function updateStats() {
                movesSpan.textContent = gameField.moves;
                manhattanSpan.textContent = gameField.manhattanDistance();
            }

            // Таймер
            function startTimer() {
                if (gameField.timerInterval) clearInterval(gameField.timerInterval);
                gameField.startTime = Date.now() - (gameField._elapsed || 0);
                gameField.timerInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - gameField.startTime) / 1000);
                    const mins = Math.floor(elapsed / 60);
                    const secs = elapsed % 60;
                    timerSpan.textContent = `⏱️ ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                }, 200);
            }

            // Зупинка таймера
            function stopTimer() {
                if (gameField.timerInterval) {
                    clearInterval(gameField.timerInterval);
                    gameField.timerInterval = null;
                    gameField._elapsed = Date.now() - gameField.startTime;
                }
            }

            // Нова гра
            function newGame() {
                stopTimer();
                gameField.shuffle(180);
                renderer.clearHint();
                renderer.render(gameField);
                gameField.moves = 0;
                gameField._elapsed = 0;
                startTimer();
                updateStats();
            }

            // Перевірка на перемогу після ходу
            function checkWin() {
                if (gameField.isWin()) {
                    stopTimer();
                    const elapsed = Math.floor((gameField._elapsed || 0) / 1000);
                    const mins = Math.floor(elapsed / 60);
                    const secs = elapsed % 60;
                    winMovesSpan.textContent = gameField.moves;
                    winTimeSpan.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
                    winModal.classList.add('active');

                    // Зберегти (ім'я за замовч. "Гравець")
                    scoreManager.addRecord('Гравець', gameField.moves, elapsed);
                }
            }

            // Обробка кліків
            boardEl.addEventListener('click', (e) => {
                const tile = e.target.closest('.tile');
                if (!tile) return;
                const index = parseInt(tile.dataset.index);
                if (gameField.tryMove(index)) {
                    renderer.clearHint();
                    renderer.render(gameField);
                    updateStats();
                    checkWin();
                }
            });

            // Клавіші
            window.addEventListener('keydown', (e) => {
                const key = e.key;
                const empty = gameField.getEmptyIndex();
                const row = Math.floor(empty / 4);
                const col = empty % 4;
                let moveIdx = null;

                if (key === 'ArrowUp' || key === 'w' || key === 'W') moveIdx = empty + 4; // знизу вгору (пуста рухається вниз, але нам треба плитку яка піде на пусту)
                else if (key === 'ArrowDown' || key === 's' || key === 'S') moveIdx = empty - 4;
                else if (key === 'ArrowLeft' || key === 'a' || key === 'A') moveIdx = empty + 1;
                else if (key === 'ArrowRight' || key === 'd' || key === 'D') moveIdx = empty - 1;
                else if (key === 'n' || key === 'N') { newGame(); return; }
                else if (key === 'h' || key === 'H') { hint(); return; }
                else if (key === 't' || key === 'T') { showRecords(); return; }

                if (moveIdx !== null && moveIdx >= 0 && moveIdx < 16) {
                    e.preventDefault();
                    if (gameField.tryMove(moveIdx)) {
                        renderer.clearHint();
                        renderer.render(gameField);
                        updateStats();
                        checkWin();
                    }
                }
            });

            // Підказка
            function hint() {
                if (gameField.isWin()) return;
                const bestTile = getHintMove(gameField); // індекс плитки, яку треба перемістити
                renderer.hintIndex = bestTile;
                renderer.render(gameField);
            }

            // Показати рекорди
            function showRecords() {
                const records = scoreManager.getRecords();
                highscoresList.innerHTML = records.map(r => 
                    `<li><span>${r.name} (${r.date})</span> <span>${r.moves} ходів, ${Math.floor(r.seconds/60)}:${(r.seconds%60).toString().padStart(2,'0')}</span></li>`
                ).join('') || '<li style="color: #aaa;">Поки що рекордів немає</li>';
                recordsModal.classList.add('active');
            }

            // Кнопки
            document.getElementById('newGameBtn').addEventListener('click', newGame);
            document.getElementById('hintBtn').addEventListener('click', hint);
            document.getElementById('recordsBtn').addEventListener('click', showRecords);
            document.getElementById('closeWinModal').addEventListener('click', () => winModal.classList.remove('active'));
            document.getElementById('closeRecordsModal').addEventListener('click', () => recordsModal.classList.remove('active'));
            window.addEventListener('click', (e) => {
                if (e.target.classList.contains('modal')) e.target.classList.remove('active');
            });

            // Старт
            newGame();
        })();
    </script>
</body>
</html>
