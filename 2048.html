<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 • Neon Green Glassmorphism</title>
    <!-- Підключення шрифтів -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ========== style.css ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Montserrat', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 40%, #0f3f1a, #0a1f0a);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .game-container {
            max-width: 600px;
            width: 100%;
        }

        /* Glass-панель з неоновим відтінком */
        .glass-panel {
            background: rgba(10, 30, 10, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 100, 0.3);
            border-radius: 40px;
            padding: 30px 24px;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.8), 
                        0 0 30px rgba(0, 255, 150, 0.2),
                        inset 0 1px 2px rgba(255, 255, 255, 0.1);
        }

        /* Хедер зі статистикою */
        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat-item {
            background: rgba(0, 30, 0, 0.6);
            border-radius: 60px;
            padding: 10px 20px;
            border: 1px solid rgba(0, 255, 100, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ccffcc;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0, 255, 100, 0.2), 0 4px 0 #0a2f0a;
        }

        .stat-icon {
            font-size: 1.4rem;
            filter: drop-shadow(0 0 5px #00ff80);
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #aaffaa;
            text-shadow: 0 0 10px #00ffaa, 0 0 20px #00ff80;
            letter-spacing: 1px;
        }

        .best-badge {
            background: #00aa40;
            color: #000000;
            border-radius: 30px;
            padding: 8px 18px;
            font-weight: 700;
            font-size: 1rem;
            border: 1px solid #aaffaa;
            box-shadow: 0 0 20px #00ff80, 0 4px 0 #004d1a;
        }

        /* Ігрове поле (CSS Grid) */
        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            background: rgba(0, 40, 0, 0.5);
            border-radius: 36px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 255, 100, 0.5);
            box-shadow: inset 0 0 30px #001a00, 0 20px 30px -10px #000000cc, 0 0 30px #00aa40;
        }

        /* Плитка (Tile) - базовий стиль */
        .tile {
            aspect-ratio: 1 / 1;
            background: rgba(20, 50, 20, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 800;
            color: #f0fff0;
            border: 2px solid rgba(0, 255, 150, 0.3);
            box-shadow: 0 10px 0 #0a2f0a, 0 8px 20px rgba(0, 255, 100, 0.3);
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            cursor: pointer;
            user-select: none;
            text-shadow: 0 2px 5px #00000080, 0 0 10px #00ffaa;
        }

        /* Стилі для різних значень (неонова градація) */
        .tile[data-value="2"] { background: rgba(30, 70, 30, 0.9); border-color: #aaffaa; box-shadow: 0 0 20px #aaffaa, 0 10px 0 #0a3a0a; }
        .tile[data-value="4"] { background: rgba(20, 90, 20, 0.9); border-color: #88ff88; box-shadow: 0 0 25px #88ff88, 0 10px 0 #0a4a0a; }
        .tile[data-value="8"] { background: rgba(10, 110, 30, 0.9); border-color: #66ff88; box-shadow: 0 0 30px #66ff88, 0 10px 0 #0a5a0a; }
        .tile[data-value="16"] { background: rgba(0, 130, 30, 0.9); border-color: #44ff66; box-shadow: 0 0 35px #44ff66, 0 10px 0 #0a6a0a; }
        .tile[data-value="32"] { background: rgba(0, 150, 30, 0.9); border-color: #22ff44; box-shadow: 0 0 40px #22ff44, 0 10px 0 #0a7a0a; }
        .tile[data-value="64"] { background: rgba(0, 170, 30, 0.9); border-color: #00ff22; box-shadow: 0 0 45px #00ff22, 0 10px 0 #0a8a0a; }
        .tile[data-value="128"] { background: rgba(0, 190, 40, 0.9); border-color: #00ff44; font-size: 2rem; box-shadow: 0 0 50px #00ff44, 0 10px 0 #0a9a0a; }
        .tile[data-value="256"] { background: rgba(0, 210, 50, 0.9); border-color: #00ff66; font-size: 2rem; box-shadow: 0 0 55px #00ff66, 0 10px 0 #0aaa0a; }
        .tile[data-value="512"] { background: rgba(0, 230, 60, 0.9); border-color: #00ff88; font-size: 2rem; box-shadow: 0 0 60px #00ff88, 0 10px 0 #0aba0a; }
        .tile[data-value="1024"] { background: rgba(0, 250, 70, 0.9); border-color: #00ffaa; font-size: 1.8rem; box-shadow: 0 0 70px #00ffaa, 0 10px 0 #0aca0a; }
        .tile[data-value="2048"] { background: rgba(100, 255, 100, 1); border-color: #ffffff; color: #002200; font-size: 1.8rem; box-shadow: 0 0 100px #88ff88, 0 10px 0 #0ada0a; text-shadow: none; }

        .tile:not(.empty):hover {
            transform: scale(1.02);
            border-color: #ccffcc;
            box-shadow: 0 0 40px #00ffaa, 0 6px 0 #0a3a0a;
        }

        /* Панель керування */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }

        .glass-btn {
            background: rgba(0, 40, 0, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #00ff80;
            padding: 12px 22px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            color: #ccffcc;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #0a2f0a, 0 0 20px #00aa40;
            letter-spacing: 0.5px;
            flex: 1 0 auto;
            min-width: 100px;
            text-transform: uppercase;
        }

        .glass-btn:hover {
            background: #00aa40;
            color: black;
            box-shadow: 0 0 40px #00ff80, 0 4px 0 #004d1a;
            transform: translateY(-2px);
            border-color: #aaffaa;
        }

        .glass-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #004d1a, 0 0 40px #00ff80;
        }

        /* Модальне вікно (Glass pop-up) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 20, 0, 0.8);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
            animation: popUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-content {
            background: rgba(10, 40, 10, 0.9);
            backdrop-filter: blur(16px);
            border: 2px solid #00ff80;
            border-radius: 60px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            color: #ccffcc;
            box-shadow: 0 30px 50px #000000cc, 0 0 80px #00ff80;
        }

        .modal-content h2 {
            font-size: 2.8rem;
            color: #aaffaa;
            text-shadow: 0 0 20px #00ff80;
            margin-bottom: 15px;
        }

        .modal-stats {
            font-size: 1.4rem;
            background: #00220080;
            border-radius: 40px;
            padding: 15px;
            margin: 20px 0;
            border: 1px solid #00ff80;
        }

        .close-btn {
            background: #00aa40;
            border: none;
            padding: 14px 30px;
            border-radius: 40px;
            font-weight: bold;
            color: #000;
            font-size: 1.2rem;
            cursor: pointer;
            border-bottom: 4px solid #004d1a;
            box-shadow: 0 0 30px #88ff88;
        }

        @keyframes popUp {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Таблиця рекордів */
        .records-list {
            list-style: none;
            text-align: left;
            background: #00220080;
            border-radius: 30px;
            padding: 15px;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #00ff80;
        }

        .records-list li {
            padding: 8px 12px;
            border-bottom: 1px solid #00aa40;
            display: flex;
            justify-content: space-between;
            font-family: 'Montserrat', monospace;
        }

        .records-list li span:first-child { color: #aaffaa; }
        .records-list li span:last-child { color: #ffffff; font-weight: 700; text-shadow: 0 0 10px #00ff80; }
    </style>
</head>
<body>
    <div class="game-container glass-panel">
        <!-- Статистика -->
        <div class="stats-header">
            <div class="stat-item"><span class="stat-icon">🎯</span> Рахунок: <span id="scoreDisplay" class="stat-value">0</span></div>
            <div class="stat-item"><span class="stat-icon">🏆</span> Найкращий: <span id="bestDisplay" class="stat-value">0</span></div>
            <div class="best-badge" id="timerDisplay">⏱️ 00:00</div>
        </div>

        <!-- Ігрове поле 4x4 -->
        <div id="board" class="board"></div>

        <!-- Панель кнопок -->
        <div class="controls">
            <button class="glass-btn" id="newGameBtn">🔄 N: Нова</button>
            <button class="glass-btn" id="hintBtn">💡 H: Підказка</button>
            <button class="glass-btn" id="recordsBtn">🏆 T: Рекорди</button>
        </div>
        <div style="text-align: center; margin-top: 15px; color:#88ff88; text-shadow:0 0 5px #00ff80; font-size:0.9rem;">
            ←↑→↓  або  W A S D  ·  автоматичне об'єднання
        </div>
    </div>

    <!-- Модальне вікно перемоги (2048) -->
    <div id="winModal" class="modal">
        <div class="modal-content">
            <h2>🏆 2048!</h2>
            <div class="modal-stats">
                <div>⭐ Рахунок: <span id="winScore">0</span></div>
                <div>⏱️ Час: <span id="winTime">0:00</span></div>
            </div>
            <button class="close-btn" id="closeWinModal">Супер!</button>
        </div>
    </div>

    <!-- Модальне вікно рекордів -->
    <div id="recordsModal" class="modal">
        <div class="modal-content">
            <h2>🏅 Топ-10</h2>
            <ul id="highscoresList" class="records-list"></ul>
            <button class="close-btn" id="closeRecordsModal">OK</button>
        </div>
    </div>

    <script>
        // ========== logic.js та storage.js (ES6+) ==========

        (function() {
            // ---------- Клас Tile для 2048 ----------
            class Tile {
                constructor(value = null) {
                    this.value = value; // null для порожньої
                }
                isEmpty() {
                    return this.value === null;
                }
            }

            // ---------- GameField (логіка 2048) ----------
            class GameField {
                constructor() {
                    this.size = 4;
                    this.grid = [];
                    this.score = 0;
                    this.bestScore = 0;
                    this.startTime = Date.now();
                    this.timerInterval = null;
                    this.listeners = [];
                    this.winFlag = false; // чи досягнуто 2048
                }

                // Ініціалізація порожньої сітки
                initEmpty() {
                    this.grid = Array.from({ length: this.size }, () => 
                        Array.from({ length: this.size }, () => new Tile())
                    );
                    this.score = 0;
                    this.winFlag = false;
                }

                // Додати випадкову плитку (2 з ймовірністю 90%, 4 - 10%)
                addRandomTile() {
                    const emptyCells = [];
                    for (let r = 0; r < this.size; r++) {
                        for (let c = 0; c < this.size; c++) {
                            if (this.grid[r][c].isEmpty()) emptyCells.push([r, c]);
                        }
                    }
                    if (emptyCells.length === 0) return false;
                    
                    const [r, c] = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    const value = Math.random() < 0.9 ? 2 : 4;
                    this.grid[r][c] = new Tile(value);
                    return true;
                }

                // Нова гра
                newGame() {
                    this.initEmpty();
                    this.addRandomTile();
                    this.addRandomTile();
                    this.loadBestScore();
                    this.startTimer();
                    this.notify();
                }

                // Завантажити найкращий рахунок
                loadBestScore() {
                    const saved = localStorage.getItem('2048_best');
                    this.bestScore = saved ? parseInt(saved) : 0;
                }

                // Зберегти найкращий рахунок
                saveBestScore() {
                    if (this.score > this.bestScore) {
                        this.bestScore = this.score;
                        localStorage.setItem('2048_best', this.bestScore.toString());
                    }
                }

                // Рух вліво (основна логіка)
                moveLeft() {
                    let moved = false;
                    for (let r = 0; r < this.size; r++) {
                        const row = this.grid[r];
                        // Видаляємо порожні, стискаємо
                        const nonEmpty = row.filter(tile => !tile.isEmpty()).map(t => t.value);
                        if (nonEmpty.length === 0) continue;
                        
                        const merged = [];
                        for (let i = 0; i < nonEmpty.length; i++) {
                            if (i < nonEmpty.length - 1 && nonEmpty[i] === nonEmpty[i + 1]) {
                                merged.push(nonEmpty[i] * 2);
                                this.score += nonEmpty[i] * 2;
                                if (nonEmpty[i] * 2 === 2048) this.winFlag = true;
                                i++; // пропускаємо наступний
                            } else {
                                merged.push(nonEmpty[i]);
                            }
                        }
                        
                        // Заповнюємо рядок
                        const newRow = [];
                        for (let v of merged) newRow.push(new Tile(v));
                        while (newRow.length < 4) newRow.push(new Tile());
                        
                        // Перевіряємо, чи змінилося
                        for (let c = 0; c < 4; c++) {
                            if (this.grid[r][c].value !== newRow[c].value) moved = true;
                        }
                        this.grid[r] = newRow;
                    }
                    return moved;
                }

                // Транспонування матриці (для інших напрямків)
                transpose() {
                    const newGrid = Array.from({ length: this.size }, () => Array(this.size).fill(null));
                    for (let r = 0; r < this.size; r++) {
                        for (let c = 0; c < this.size; c++) {
                            newGrid[c][r] = this.grid[r][c];
                        }
                    }
                    this.grid = newGrid;
                }

                // Реверс рядків (для right)
                reverseRows() {
                    for (let r = 0; r < this.size; r++) {
                        this.grid[r].reverse();
                    }
                }

                // Рух вправо
                moveRight() {
                    this.reverseRows();
                    const moved = this.moveLeft();
                    this.reverseRows();
                    return moved;
                }

                // Рух вгору
                moveUp() {
                    this.transpose();
                    const moved = this.moveLeft();
                    this.transpose();
                    return moved;
                }

                // Рух вниз
                moveDown() {
                    this.transpose();
                    this.reverseRows();
                    const moved = this.moveLeft();
                    this.reverseRows();
                    this.transpose();
                    return moved;
                }

                // Спробувати зробити хід у напрямку
                tryMove(direction) {
                    const oldGrid = JSON.stringify(this.grid.map(row => row.map(t => t.value)));
                    let moved = false;
                    
                    switch(direction) {
                        case 'left': moved = this.moveLeft(); break;
                        case 'right': moved = this.moveRight(); break;
                        case 'up': moved = this.moveUp(); break;
                        case 'down': moved = this.moveDown(); break;
                    }
                    
                    if (moved) {
                        this.addRandomTile();
                        this.saveBestScore();
                        this.notify();
                        return true;
                    }
                    return false;
                }

                // Перевірка на перемогу (досягнуто 2048)
                isWin() {
                    return this.winFlag;
                }

                // Перевірка на завершення гри (немає ходів)
                isGameOver() {
                    // Перевіряємо наявність порожніх
                    for (let r = 0; r < this.size; r++) {
                        for (let c = 0; c < this.size; c++) {
                            if (this.grid[r][c].isEmpty()) return false;
                        }
                    }
                    
                    // Перевіряємо можливість об'єднання по горизонталі
                    for (let r = 0; r < this.size; r++) {
                        for (let c = 0; c < this.size - 1; c++) {
                            if (this.grid[r][c].value === this.grid[r][c + 1].value) return false;
                        }
                    }
                    
                    // По вертикалі
                    for (let c = 0; c < this.size; c++) {
                        for (let r = 0; r < this.size - 1; r++) {
                            if (this.grid[r][c].value === this.grid[r + 1][c].value) return false;
                        }
                    }
                    
                    return true;
                }

                // Отримати найкращий хід для підказки (на основі потенційного збільшення рахунку)
                getHint() {
                    const directions = ['left', 'right', 'up', 'down'];
                    let bestDir = null;
                    let bestScore = -1;
                    
                    for (let dir of directions) {
                        // Клонуємо поточний стан
                        const clone = new GameField();
                        clone.grid = this.grid.map(row => row.map(t => new Tile(t.value)));
                        clone.score = this.score;
                        
                        // Виконуємо хід
                        let moved = false;
                        switch(dir) {
                            case 'left': moved = clone.moveLeft(); break;
                            case 'right': moved = clone.moveRight(); break;
                            case 'up': moved = clone.moveUp(); break;
                            case 'down': moved = clone.moveDown(); break;
                        }
                        
                        if (moved && clone.score > bestScore) {
                            bestScore = clone.score;
                            bestDir = dir;
                        }
                    }
                    
                    return bestDir;
                }

                // Підписка на зміни
                subscribe(listener) {
                    this.listeners.push(listener);
                }

                notify() {
                    this.listeners.forEach(fn => fn());
                }

                // Таймер
                startTimer() {
                    if (this.timerInterval) clearInterval(this.timerInterval);
                    this.startTime = Date.now() - (this._elapsed || 0);
                    this.timerInterval = setInterval(() => {
                        this._elapsed = Date.now() - this.startTime;
                        this.notify(); // для оновлення таймера
                    }, 200);
                }

                stopTimer() {
                    if (this.timerInterval) {
                        clearInterval(this.timerInterval);
                        this.timerInterval = null;
                        this._elapsed = Date.now() - this.startTime;
                    }
                }

                getElapsedSeconds() {
                    return Math.floor((this._elapsed || 0) / 1000);
                }
            }

            // ---------- ScoreManager (localStorage) ----------
            class ScoreManager {
                constructor() {
                    this.storageKey = '2048_top10';
                }

                getRecords() {
                    const stored = localStorage.getItem(this.storageKey);
                    return stored ? JSON.parse(stored) : [];
                }

                addRecord(name, score, seconds) {
                    const records = this.getRecords();
                    const date = new Date().toLocaleDateString('uk-UA');
                    records.push({ name, score, seconds, date });
                    records.sort((a, b) => b.score - a.score || a.seconds - b.seconds); // за спаданням рахунку
                    const top10 = records.slice(0, 10);
                    localStorage.setItem(this.storageKey, JSON.stringify(top10));
                }
            }

            // ---------- Renderer (DOM) ----------
            class Renderer {
                constructor(boardEl, gameField, scoreManager) {
                    this.boardEl = boardEl;
                    gameField.subscribe(() => this.render(gameField));
                    this.scoreManager = scoreManager;
                    this.hintDirection = null;
                }

                render(gameField) {
                    this.boardEl.innerHTML = '';
                    for (let r = 0; r < gameField.size; r++) {
                        for (let c = 0; c < gameField.size; c++) {
                            const tile = gameField.grid[r][c];
                            const tileDiv = document.createElement('div');
                            tileDiv.className = 'tile';
                            if (!tile.isEmpty()) {
                                tileDiv.textContent = tile.value;
                                tileDiv.setAttribute('data-value', tile.value);
                            } else {
                                tileDiv.classList.add('empty');
                                tileDiv.style.background = 'rgba(20, 40, 20, 0.3)';
                                tileDiv.style.border = '2px dashed #00aa40';
                            }
                            
                            // Підсвітка підказки (напрямок)
                            if (this.hintDirection) {
                                tileDiv.style.borderColor = '#aaffaa';
                                tileDiv.style.boxShadow = '0 0 30px #88ff88';
                            }
                            
                            this.boardEl.appendChild(tileDiv);
                        }
                    }
                }

                setHint(direction) {
                    this.hintDirection = direction;
                }
            }

            // ---------- Ініціалізація ----------
            const gameField = new GameField();
            const scoreManager = new ScoreManager();

            // DOM елементи
            const boardEl = document.getElementById('board');
            const scoreSpan = document.getElementById('scoreDisplay');
            const bestSpan = document.getElementById('bestDisplay');
            const timerSpan = document.getElementById('timerDisplay');
            const winModal = document.getElementById('winModal');
            const recordsModal = document.getElementById('recordsModal');
            const winScoreSpan = document.getElementById('winScore');
            const winTimeSpan = document.getElementById('winTime');
            const highscoresList = document.getElementById('highscoresList');

            const renderer = new Renderer(boardEl, gameField, scoreManager);

            // Оновлення статистики
            function updateStats() {
                scoreSpan.textContent = gameField.score;
                bestSpan.textContent = gameField.bestScore;
                
                const elapsed = gameField.getElapsedSeconds();
                const mins = Math.floor(elapsed / 60);
                const secs = elapsed % 60;
                timerSpan.textContent = `⏱️ ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            // Підписка на оновлення
            gameField.subscribe(updateStats);

            // Нова гра
            function newGame() {
                gameField.stopTimer();
                gameField.newGame();
                renderer.setHint(null);
                renderer.render(gameField);
                updateStats();
            }

            // Перевірка стану після ходу
            function afterMove() {
                renderer.render(gameField);
                updateStats();
                
                if (gameField.isWin()) {
                    gameField.stopTimer();
                    const elapsed = gameField.getElapsedSeconds();
                    const mins = Math.floor(elapsed / 60);
                    const secs = elapsed % 60;
                    winScoreSpan.textContent = gameField.score;
                    winTimeSpan.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
                    winModal.classList.add('active');
                    
                    // Зберегти рекорд
                    scoreManager.addRecord('Гравець', gameField.score, elapsed);
                } else if (gameField.isGameOver()) {
                    setTimeout(() => {
                        alert('😵 Гра закінчена! Немає доступних ходів.');
                    }, 50);
                }
            }

            // Обробка клавіш
            window.addEventListener('keydown', (e) => {
                const key = e.key;
                let moved = false;
                
                if (key === 'ArrowLeft' || key === 'a' || key === 'A') moved = gameField.tryMove('left');
                else if (key === 'ArrowRight' || key === 'd' || key === 'D') moved = gameField.tryMove('right');
                else if (key === 'ArrowUp' || key === 'w' || key === 'W') moved = gameField.tryMove('up');
                else if (key === 'ArrowDown' || key === 's' || key === 'S') moved = gameField.tryMove('down');
                else if (key === 'n' || key === 'N') { newGame(); return; }
                else if (key === 'h' || key === 'H') { hint(); return; }
                else if (key === 't' || key === 'T') { showRecords(); return; }
                
                if (moved) {
                    renderer.setHint(null);
                    afterMove();
                }
            });

            // Підказка
            function hint() {
                const bestDir = gameField.getHint();
                if (bestDir) {
                    renderer.setHint(bestDir);
                    renderer.render(gameField);
                    
                    // Підсвітити напрямок на 1.5 секунди
                    setTimeout(() => {
                        renderer.setHint(null);
                        renderer.render(gameField);
                    }, 1500);
                }
            }

            // Показати рекорди
            function showRecords() {
                const records = scoreManager.getRecords();
                highscoresList.innerHTML = records.map(r => 
                    `<li><span>${r.name} (${r.date})</span> <span>${r.score} очок, ${Math.floor(r.seconds/60)}:${(r.seconds%60).toString().padStart(2,'0')}</span></li>`
                ).join('') || '<li style="color: #88ff88;">Поки що рекордів немає</li>';
                recordsModal.classList.add('active');
            }

            // Кнопки
            document.getElementById('newGameBtn').addEventListener('click', newGame);
            document.getElementById('hintBtn').addEventListener('click', hint);
            document.getElementById('recordsBtn').addEventListener('click', showRecords);
            document.getElementById('closeWinModal').addEventListener('click', () => winModal.classList.remove('active'));
            document.getElementById('closeRecordsModal').addEventListener('click', () => recordsModal.classList.remove('active'));
            
            window.addEventListener('click', (e) => {
                if (e.target.classList.contains('modal')) e.target.classList.remove('active');
            });

            // Старт
            gameField.loadBestScore();
            newGame();
        })();
    </script>
</body>
</html>
