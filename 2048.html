<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>2048 • Neon Green Glassmorphism</title>
    <!-- Підключення шрифтів -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ========== style.css ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Montserrat', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 40%, #0f3f1a, #0a1f0a);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            touch-action: pan-y pinch-zoom;
        }

        .game-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        /* Glass-панель з неоновим відтінком */
        .glass-panel {
            background: rgba(10, 30, 10, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 100, 0.3);
            border-radius: 40px;
            padding: 20px 20px 25px 20px;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.8), 
                        0 0 30px rgba(0, 255, 150, 0.2),
                        inset 0 1px 2px rgba(255, 255, 255, 0.1);
        }

        /* Хедер зі статистикою */
        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat-item {
            background: rgba(0, 30, 0, 0.7);
            border-radius: 60px;
            padding: 8px 16px;
            border: 1px solid rgba(0, 255, 100, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ccffcc;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0, 255, 100, 0.2), 0 4px 0 #0a2f0a;
        }

        .stat-icon {
            font-size: 1.2rem;
            filter: drop-shadow(0 0 5px #00ff80);
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #aaffaa;
            text-shadow: 0 0 10px #00ffaa, 0 0 20px #00ff80;
            letter-spacing: 1px;
        }

        .best-badge {
            background: #00aa40;
            color: #000000;
            border-radius: 30px;
            padding: 8px 16px;
            font-weight: 700;
            font-size: 1rem;
            border: 1px solid #aaffaa;
            box-shadow: 0 0 20px #00ff80, 0 4px 0 #004d1a;
        }

        /* Ігрове поле (CSS Grid) */
        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: rgba(0, 40, 0, 0.6);
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 255, 100, 0.5);
            box-shadow: inset 0 0 30px #001a00, 0 20px 30px -10px #000000cc, 0 0 30px #00aa40;
            touch-action: none;
        }

        /* Плитка (Tile) - базовий стиль */
        .tile {
            aspect-ratio: 1 / 1;
            background: rgba(20, 50, 20, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            color: #f0fff0;
            border: 2px solid rgba(0, 255, 150, 0.3);
            box-shadow: 0 6px 0 #0a2f0a, 0 8px 15px rgba(0, 255, 100, 0.3);
            transition: all 0.15s ease;
            cursor: pointer;
            user-select: none;
            text-shadow: 0 2px 5px #00000080, 0 0 10px #00ffaa;
        }

        /* Стилі для різних значень (неонова градація) */
        .tile[data-value="2"] { background: rgba(30, 80, 30, 0.95); border-color: #aaffaa; box-shadow: 0 0 20px #aaffaa, 0 6px 0 #0a3a0a; }
        .tile[data-value="4"] { background: rgba(20, 100, 20, 0.95); border-color: #88ff88; box-shadow: 0 0 25px #88ff88, 0 6px 0 #0a4a0a; }
        .tile[data-value="8"] { background: rgba(10, 120, 30, 0.95); border-color: #66ff88; box-shadow: 0 0 30px #66ff88, 0 6px 0 #0a5a0a; }
        .tile[data-value="16"] { background: rgba(0, 140, 30, 0.95); border-color: #44ff66; box-shadow: 0 0 35px #44ff66, 0 6px 0 #0a6a0a; }
        .tile[data-value="32"] { background: rgba(0, 160, 30, 0.95); border-color: #22ff44; box-shadow: 0 0 40px #22ff44, 0 6px 0 #0a7a0a; }
        .tile[data-value="64"] { background: rgba(0, 180, 30, 0.95); border-color: #00ff22; box-shadow: 0 0 45px #00ff22, 0 6px 0 #0a8a0a; }
        .tile[data-value="128"] { background: rgba(0, 200, 40, 0.95); border-color: #00ff44; font-size: 1.8rem; box-shadow: 0 0 50px #00ff44, 0 6px 0 #0a9a0a; }
        .tile[data-value="256"] { background: rgba(0, 220, 50, 0.95); border-color: #00ff66; font-size: 1.8rem; box-shadow: 0 0 55px #00ff66, 0 6px 0 #0aaa0a; }
        .tile[data-value="512"] { background: rgba(0, 240, 60, 0.95); border-color: #00ff88; font-size: 1.8rem; box-shadow: 0 0 60px #00ff88, 0 6px 0 #0aba0a; }
        .tile[data-value="1024"] { background: rgba(0, 255, 70, 0.95); border-color: #00ffaa; font-size: 1.5rem; box-shadow: 0 0 70px #00ffaa, 0 6px 0 #0aca0a; }
        .tile[data-value="2048"] { background: rgba(100, 255, 100, 1); border-color: #ffffff; color: #002200; font-size: 1.5rem; box-shadow: 0 0 100px #88ff88, 0 6px 0 #0ada0a; text-shadow: none; }

        .tile.empty {
            background: rgba(20, 40, 20, 0.4);
            border: 2px dashed #00aa40;
            box-shadow: none;
        }

        .tile:not(.empty):active {
            transform: scale(0.98);
        }

        /* Панель керування */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 10px;
        }

        .glass-btn {
            background: rgba(0, 40, 0, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid #00ff80;
            padding: 10px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #ccffcc;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 0 #0a2f0a, 0 0 15px #00aa40;
            letter-spacing: 0.5px;
            flex: 1 1 auto;
            min-width: 90px;
            text-transform: uppercase;
            touch-action: manipulation;
        }

        .glass-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0a2f0a, 0 0 20px #00ff80;
        }

        /* Модальне вікно */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 20, 0, 0.85);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
            animation: popUp 0.25s ease-out;
        }

        .modal-content {
            background: rgba(10, 40, 10, 0.95);
            backdrop-filter: blur(8px);
            border: 2px solid #00ff80;
            border-radius: 40px;
            padding: 30px 25px;
            max-width: 350px;
            width: 90%;
            text-align: center;
            color: #ccffcc;
            box-shadow: 0 20px 40px #000000cc, 0 0 60px #00ff80;
        }

        .modal-content h2 {
            font-size: 2.2rem;
            color: #aaffaa;
            text-shadow: 0 0 20px #00ff80;
            margin-bottom: 15px;
        }

        .modal-stats {
            font-size: 1.2rem;
            background: #00220080;
            border-radius: 30px;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid #00ff80;
        }

        .close-btn {
            background: #00aa40;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            color: #000;
            font-size: 1.1rem;
            cursor: pointer;
            border-bottom: 3px solid #004d1a;
            box-shadow: 0 0 25px #88ff88;
            touch-action: manipulation;
        }

        @keyframes popUp {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .records-list {
            list-style: none;
            text-align: left;
            background: #00220080;
            border-radius: 25px;
            padding: 12px;
            margin: 15px 0;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #00ff80;
        }

        .records-list li {
            padding: 6px 10px;
            border-bottom: 1px solid #00aa40;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        .footer-note {
            text-align: center; 
            margin-top: 12px; 
            color: #88ff88; 
            text-shadow:0 0 5px #00ff80; 
            font-size:0.8rem;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="glass-panel">
            <!-- Статистика -->
            <div class="stats-header">
                <div class="stat-item">
                    <span class="stat-icon">🎯</span> 
                    <span id="scoreDisplay" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🏆</span> 
                    <span id="bestDisplay" class="stat-value">0</span>
                </div>
                <div class="best-badge" id="timerDisplay">⏱️ 00:00</div>
            </div>

            <!-- Ігрове поле 4x4 -->
            <div id="board" class="board"></div>

            <!-- Панель керування -->
            <div class="controls">
                <button class="glass-btn" id="newGameBtn">🔄 Нова</button>
                <button class="glass-btn" id="hintBtn">💡 Підказка</button>
                <button class="glass-btn" id="recordsBtn">🏆 Рекорди</button>
            </div>
            <div class="footer-note">
                ←↑→↓ · WASD · Свайпи по полю
            </div>
        </div>
    </div>

    <!-- Модальне вікно перемоги -->
    <div id="winModal" class="modal">
        <div class="modal-content">
            <h2>🏆 2048!</h2>
            <div class="modal-stats">
                <div>⭐ Рахунок: <span id="winScore">0</span></div>
                <div>⏱️ Час: <span id="winTime">0:00</span></div>
            </div>
            <button class="close-btn" id="closeWinModal">Супер!</button>
        </div>
    </div>

    <!-- Модальне вікно рекордів -->
    <div id="recordsModal" class="modal">
        <div class="modal-content">
            <h2>🏅 Топ-10</h2>
            <ul id="highscoresList" class="records-list"></ul>
            <button class="close-btn" id="closeRecordsModal">OK</button>
        </div>
    </div>

    <script>
        (function() {
            // ---------- Клас Tile ----------
            class Tile {
                constructor(value = null) {
                    this.value = value;
                }
                isEmpty() {
                    return this.value === null;
                }
            }

            // ---------- GameField ----------
            class GameField {
                constructor() {
                    this.size = 4;
                    this.grid = [];
                    this.score = 0;
                    this.bestScore = 0;
                    this.startTime = Date.now();
                    this.timerInterval = null;
                    this.listeners = [];
                    this.winFlag = false;
                    this._elapsed = 0;
                }

                initEmpty() {
                    this.grid = Array.from({ length: this.size }, () => 
                        Array.from({ length: this.size }, () => new Tile())
                    );
                    this.score = 0;
                    this.winFlag = false;
                }

                addRandomTile() {
                    const emptyCells = [];
                    for (let r = 0; r < this.size; r++) {
                        for (let c = 0; c < this.size; c++) {
                            if (this.grid[r][c].isEmpty()) emptyCells.push([r, c]);
                        }
                    }
                    if (emptyCells.length === 0) return false;
                    
                    const [r, c] = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    const value = Math.random() < 0.9 ? 2 : 4;
                    this.grid[r][c] = new Tile(value);
                    return true;
                }

                newGame() {
                    this.initEmpty();
                    this.addRandomTile();
                    this.addRandomTile();
                    this.loadBestScore();
                    this.startTimer();
                    this.notify();
                }

                loadBestScore() {
                    const saved = localStorage.getItem('2048_best');
                    this.bestScore = saved ? parseInt(saved) : 0;
                }

                saveBestScore() {
                    if (this.score > this.bestScore) {
                        this.bestScore = this.score;
                        localStorage.setItem('2048_best', this.bestScore.toString());
                    }
                }

                moveLeft() {
                    let moved = false;
                    for (let r = 0; r < this.size; r++) {
                        const row = this.grid[r];
                        const nonEmpty = row.filter(tile => !tile.isEmpty()).map(t => t.value);
                        if (nonEmpty.length === 0) continue;
                        
                        const merged = [];
                        for (let i = 0; i < nonEmpty.length; i++) {
                            if (i < nonEmpty.length - 1 && nonEmpty[i] === nonEmpty[i + 1]) {
                                merged.push(nonEmpty[i] * 2);
                                this.score += nonEmpty[i] * 2;
                                if (nonEmpty[i] * 2 === 2048) this.winFlag = true;
                                i++;
                            } else {
                                merged.push(nonEmpty[i]);
                            }
                        }
                        
                        const newRow = [];
                        for (let v of merged) newRow.push(new Tile(v));
                        while (newRow.length < 4) newRow.push(new Tile());
                        
                        for (let c = 0; c < 4; c++) {
                            if (this.grid[r][c]?.value !== newRow[c]?.value) moved = true;
                        }
                        this.grid[r] = newRow;
                    }
                    return moved;
                }

                transpose() {
                    const newGrid = Array.from({ length: this.size }, () => Array(this.size).fill(null));
                    for (let r = 0; r < this.size; r++) {
                        for (let c = 0; c < this.size; c++) {
                            newGrid[c][r] = this.grid[r][c];
                        }
                    }
                    this.grid = newGrid;
                }

                reverseRows() {
                    for (let r = 0; r < this.size; r++) {
                        this.grid[r].reverse();
                    }
                }

                moveRight() {
                    this.reverseRows();
                    const moved = this.moveLeft();
                    this.reverseRows();
                    return moved;
                }

                moveUp() {
                    this.transpose();
                    const moved = this.moveLeft();
                    this.transpose();
                    return moved;
                }

                moveDown() {
                    this.transpose();
                    this.reverseRows();
                    const moved = this.moveLeft();
                    this.reverseRows();
                    this.transpose();
                    return moved;
                }

                tryMove(direction) {
                    let moved = false;
                    
                    switch(direction) {
                        case 'left': moved = this.moveLeft(); break;
                        case 'right': moved = this.moveRight(); break;
                        case 'up': moved = this.moveUp(); break;
                        case 'down': moved = this.moveDown(); break;
                    }
                    
                    if (moved) {
                        this.addRandomTile();
                        this.saveBestScore();
                        this.notify();
                        return true;
                    }
                    return false;
                }

                isWin() {
                    return this.winFlag;
                }

                isGameOver() {
                    for (let r = 0; r < this.size; r++) {
                        for (let c = 0; c < this.size; c++) {
                            if (this.grid[r][c].isEmpty()) return false;
                        }
                    }
                    
                    for (let r = 0; r < this.size; r++) {
                        for (let c = 0; c < this.size - 1; c++) {
                            if (this.grid[r][c].value === this.grid[r][c + 1].value) return false;
                        }
                    }
                    
                    for (let c = 0; c < this.size; c++) {
                        for (let r = 0; r < this.size - 1; r++) {
                            if (this.grid[r][c].value === this.grid[r + 1][c].value) return false;
                        }
                    }
                    
                    return true;
                }

                getHint() {
                    const directions = ['left', 'right', 'up', 'down'];
                    let bestDir = null;
                    let bestScore = -1;
                    
                    for (let dir of directions) {
                        const clone = new GameField();
                        clone.grid = this.grid.map(row => row.map(t => new Tile(t.value)));
                        clone.score = this.score;
                        
                        let moved = false;
                        switch(dir) {
                            case 'left': moved = clone.moveLeft(); break;
                            case 'right': moved = clone.moveRight(); break;
                            case 'up': moved = clone.moveUp(); break;
                            case 'down': moved = clone.moveDown(); break;
                        }
                        
                        if (moved && clone.score > bestScore) {
                            bestScore = clone.score;
                            bestDir = dir;
                        }
                    }
                    
                    return bestDir;
                }

                subscribe(listener) {
                    this.listeners.push(listener);
                }

                notify() {
                    this.listeners.forEach(fn => fn());
                }

                startTimer() {
                    if (this.timerInterval) clearInterval(this.timerInterval);
                    this.startTime = Date.now() - this._elapsed;
                    this.timerInterval = setInterval(() => {
                        this._elapsed = Date.now() - this.startTime;
                        this.notify();
                    }, 200);
                }

                stopTimer() {
                    if (this.timerInterval) {
                        clearInterval(this.timerInterval);
                        this.timerInterval = null;
                        this._elapsed = Date.now() - this.startTime;
                    }
                }

                getElapsedSeconds() {
                    return Math.floor((this._elapsed || 0) / 1000);
                }
            }

            // ---------- ScoreManager ----------
            class ScoreManager {
                constructor() {
                    this.storageKey = '2048_top10';
                }

                getRecords() {
                    const stored = localStorage.getItem(this.storageKey);
                    return stored ? JSON.parse(stored) : [];
                }

                addRecord(name, score, seconds) {
                    const records = this.getRecords();
                    const date = new Date().toLocaleDateString('uk-UA');
                    records.push({ name, score, seconds, date });
                    records.sort((a, b) => b.score - a.score || a.seconds - b.seconds);
                    const top10 = records.slice(0, 10);
                    localStorage.setItem(this.storageKey, JSON.stringify(top10));
                }
            }

            // ---------- Renderer ----------
            class Renderer {
                constructor(boardEl, gameField) {
                    this.boardEl = boardEl;
                    this.gameField = gameField;
                    gameField.subscribe(() => this.render());
                }

                render() {
                    this.boardEl.innerHTML = '';
                    for (let r = 0; r < this.gameField.size; r++) {
                        for (let c = 0; c < this.gameField.size; c++) {
                            const tile = this.gameField.grid[r][c];
                            const tileDiv = document.createElement('div');
                            tileDiv.className = 'tile';
                            if (!tile.isEmpty()) {
                                tileDiv.textContent = tile.value;
                                tileDiv.setAttribute('data-value', tile.value);
                            } else {
                                tileDiv.classList.add('empty');
                            }
                            this.boardEl.appendChild(tileDiv);
                        }
                    }
                }
            }

            // ---------- Ініціалізація ----------
            const gameField = new GameField();
            const scoreManager = new ScoreManager();

            // DOM елементи
            const boardEl = document.getElementById('board');
            const scoreSpan = document.getElementById('scoreDisplay');
            const bestSpan = document.getElementById('bestDisplay');
            const timerSpan = document.getElementById('timerDisplay');
            const winModal = document.getElementById('winModal');
            const recordsModal = document.getElementById('recordsModal');
            const winScoreSpan = document.getElementById('winScore');
            const winTimeSpan = document.getElementById('winTime');
            const highscoresList = document.getElementById('highscoresList');

            const renderer = new Renderer(boardEl, gameField);

            function updateStats() {
                scoreSpan.textContent = gameField.score;
                bestSpan.textContent = gameField.bestScore;
                
                const elapsed = gameField.getElapsedSeconds();
                const mins = Math.floor(elapsed / 60);
                const secs = elapsed % 60;
                timerSpan.textContent = `⏱️ ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            gameField.subscribe(updateStats);

            function newGame() {
                gameField.stopTimer();
                gameField.newGame();
                renderer.render();
                updateStats();
            }

            function afterMove() {
                renderer.render();
                updateStats();
                
                if (gameField.isWin()) {
                    gameField.stopTimer();
                    const elapsed = gameField.getElapsedSeconds();
                    const mins = Math.floor(elapsed / 60);
                    const secs = elapsed % 60;
                    winScoreSpan.textContent = gameField.score;
                    winTimeSpan.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
                    winModal.classList.add('active');
                    scoreManager.addRecord('Гравець', gameField.score, elapsed);
                } else if (gameField.isGameOver()) {
                    setTimeout(() => alert('😵 Гра закінчена!'), 100);
                }
            }

            // Свайпи
            let touchStartX = 0, touchStartY = 0;
            const MIN_SWIPE = 30;

            boardEl.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });

            boardEl.addEventListener('touchend', (e) => {
                if (!touchStartX) return;
                
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                
                const diffX = touchEndX - touchStartX;
                const diffY = touchEndY - touchStartY;
                
                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > MIN_SWIPE) {
                    if (diffX > 0 && gameField.tryMove('right')) afterMove();
                    else if (diffX < 0 && gameField.tryMove('left')) afterMove();
                } else if (Math.abs(diffY) > MIN_SWIPE) {
                    if (diffY > 0 && gameField.tryMove('down')) afterMove();
                    else if (diffY < 0 && gameField.tryMove('up')) afterMove();
                }
                
                touchStartX = 0;
            });

            // Клавіші
            window.addEventListener('keydown', (e) => {
                const key = e.key;
                let moved = false;
                
                if (key === 'ArrowLeft' || key === 'a' || key === 'A') moved = gameField.tryMove('left');
                else if (key === 'ArrowRight' || key === 'd' || key === 'D') moved = gameField.tryMove('right');
                else if (key === 'ArrowUp' || key === 'w' || key === 'W') moved = gameField.tryMove('up');
                else if (key === 'ArrowDown' || key === 's' || key === 'S') moved = gameField.tryMove('down');
                else if (key === 'n' || key === 'N') { newGame(); return; }
                else if (key === 'h' || key === 'H') { 
                    const hint = gameField.getHint();
                    if (hint) alert(`👉 Спробуй ${hint}`);
                    return;
                }
                else if (key === 't' || key === 'T') { showRecords(); return; }
                
                if (moved) afterMove();
            });

            function showRecords() {
                const records = scoreManager.getRecords();
                highscoresList.innerHTML = records.length ? 
                    records.map(r => `<li><span>${r.name} (${r.date})</span> <span>${r.score}</span></li>`).join('') :
                    '<li style="color: #88ff88;">Немає рекордів</li>';
                recordsModal.classList.add('active');
            }

            // Кнопки
            document.getElementById('newGameBtn').addEventListener('click', newGame);
            document.getElementById('hintBtn').addEventListener('click', () => {
                const hint = gameField.getHint();
                if (hint) alert(`👉 Найкращий хід: ${hint}`);
            });
            document.getElementById('recordsBtn').addEventListener('click', showRecords);
            document.getElementById('closeWinModal').addEventListener('click', () => winModal.classList.remove('active'));
            document.getElementById('closeRecordsModal').addEventListener('click', () => recordsModal.classList.remove('active'));
            
            window.addEventListener('click', (e) => {
                if (e.target.classList.contains('modal')) e.target.classList.remove('active');
            });

            // Старт
            gameField.loadBestScore();
            newGame();
        })();
    </script>
</body>
</html>
